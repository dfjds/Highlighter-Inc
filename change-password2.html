<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Change Password</title>
  <link rel="stylesheet" href="login.css" />
  <style>
    .error-border {
      border: 2px solid red;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <img src="logo.png" class="logo" alt="JLA Logo" />
    <h2 style="color: #E04A00;">Change Password</h2>

    <label for="newPassword">New Password:</label>
    <input type="password" id="newPassword" placeholder="Enter new password" />

    <label for="confirmPassword">Confirm Password:</label>
    <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm password"
      oninput="checkMatch()"
    />
    <p id="errorMessage" class="error"></p>

    <button onclick="changePassword()">Change Password</button>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwUMSYeNX6HRKI2cfAOCtpYHKo19PIq3cmudg1NA1UPh3YUiwKfMo_1Tm5kyb1CE_iO/exec"; // <-- replace with your deployed Apps Script URL
    const email = new URLSearchParams(window.location.search).get("email") || localStorage.getItem("email");

    function checkMatch() {
      const newPass = document.getElementById("newPassword").value;
      const confirmPass = document.getElementById("confirmPassword").value;
      const confirmInput = document.getElementById("confirmPassword");
      const errorMsg = document.getElementById("errorMessage");

      if (newPass && confirmPass && newPass !== confirmPass) {
        confirmInput.classList.add("error-border");
        errorMsg.textContent = "Passwords do not match";
      } else {
        confirmInput.classList.remove("error-border");
        errorMsg.textContent = "";
      }
    }

    function isValidPassword(pw) {
      // At least 8 chars, contains letters and digits
      return pw.length >= 8 && /[a-zA-Z]/.test(pw) && /\d/.test(pw);
    }

    async function changePassword() {
      const pass = document.getElementById("newPassword").value;
      const confirm = document.getElementById("confirmPassword").value;
      const error = document.getElementById("errorMessage");

      if (pass !== confirm) {
        error.textContent = "Passwords do not match";
        document.getElementById("confirmPassword").classList.add("error-border");
        return;
      }
      if (!isValidPassword(pass)) {
        error.textContent = "Password must be at least 8 characters long and contain letters and digits.";
        document.getElementById("newPassword").classList.add("error-border");
        return;
      }

      // Remove error highlights if valid
      document.getElementById("newPassword").classList.remove("error-border");
      document.getElementById("confirmPassword").classList.remove("error-border");
      error.textContent = "";

      const res = await fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({
          action: "changePassword",
          email,
          newPassword: pass,
        }),
      });

      const data = await res.json();
      if (data.success) {
        alert("Password updated!");
        localStorage.removeItem("email");
        window.location.href = "login.html";
      } else {
        error.textContent = data.message || "Something went wrong.";
      }
    }
  </script>
</body>
</html>
